<div class="container mt-5">
    <div class="card shadow-lg p-4">

        <h3 class="text-center mb-4">⚡ Add Charging Station</h3>

        <form (ngSubmit)="onSubmit()">

            <div class="row">

                <!-- Name -->
                <div class="col-md-6 mb-3">
                    <label>Station Name *</label>
                    <input class="form-control" [(ngModel)]="charger.name" name="name">
                </div>

                <!-- Address -->
                <div class="col-md-6 mb-3">
                    <label>Address *</label>
                    <input class="form-control" [(ngModel)]="charger.address" name="address">
                </div>

                <!-- Location -->
                <div class="col-md-6 mb-3">
                    <label>City / Location</label>
                    <input class="form-control" [(ngModel)]="charger.location" name="location">
                </div>

                <!-- Lat -->
                <div class="col-md-3 mb-3">
                    <label>Latitude</label>
                    <input type="number" class="form-control" [(ngModel)]="charger.lat" name="lat">
                </div>

                <!-- Lng -->
                <div class="col-md-3 mb-3">
                    <label>Longitude</label>
                    <input type="number" class="form-control" [(ngModel)]="charger.lng" name="lng">
                </div>

                <div class="col-md-6 mb-3">
                    <button type="button" class="btn btn-outline-primary btn-sm" (click)="useCurrentLocation()">
                        📍 Use Current Location
                    </button>
                </div>

                <!-- Type -->
                <div class="col-md-6 mb-3">
                    <label>Charger Type</label>
                    <select class="form-select" [(ngModel)]="charger.type" name="type">
                        <option value="">Select</option>
                        <option>Fast</option>
                        <option>Slow</option>
                        <option>Super</option>
                    </select>
                </div>

                <!-- Connectors -->
                <div class="col-md-6 mb-3">
                    <label>Connectors *</label>
                    <div *ngFor="let type of connectorOptions">
                        <input type="checkbox" (change)="onConnectorChange($event, type)"> {{ type }}
                    </div>
                </div>

                <!-- Power -->
                <div class="col-md-6 mb-3">
                    <label>Power Type *</label>
                    <select class="form-select" [(ngModel)]="charger.powerType" name="powerType">
                        <option value="">Select</option>
                        <option>AC</option>
                        <option>DC</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Power Output *</label>
                    <select class="form-select" [(ngModel)]="charger.powerOutput" name="powerOutput">
                        <option value="">Select</option>
                        <option [value]="30">30 kW</option>
                        <option [value]="60">60 kW</option>
                        <option [value]="120">120 kW</option>
                    </select>
                </div>

                <!-- Ports -->
                <div class="col-md-6 mb-3">
                    <label>Ports</label>
                    <input type="number" class="form-control" [(ngModel)]="charger.ports" name="ports">
                </div>

                <!-- Chargers -->
                <div class="col-md-6 mb-3">
                    <label>No. of Chargers</label>
                    <input type="number" class="form-control" [(ngModel)]="charger.numberOfChargers"
                        name="numberOfChargers">
                </div>

                <!-- Price -->
                <div class="col-md-6 mb-3">
                    <label>Price (₹/kWh)</label>
                    <input type="number" class="form-control" [(ngModel)]="charger.pricePerUnit" name="price">
                </div>

                <!-- Contact -->
                <div class="col-md-6 mb-3">
                    <label>Contact</label>
                    <input class="form-control" [(ngModel)]="charger.contact" name="contact">
                </div>

                <!-- Time -->
                <div class="col-md-6 mb-3">
                    <label>Open Time</label>
                    <input type="time" class="form-control" [(ngModel)]="charger.openTime" name="openTime">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Close Time</label>
                    <input type="time" class="form-control" [(ngModel)]="charger.closeTime" name="closeTime">
                </div>

            </div>

            <!-- Submit -->
            <div class="text-center mt-3">
                <button class="btn btn-success px-4">➕ Add Charger</button>
            </div>

        </form>

        <!-- Validation -->
        <div *ngIf="submitted && (!charger.name || !charger.address || charger.connectors.length === 0)"
            class="alert alert-danger mt-3">
            Please fill required fields ⚠️
        </div>

    </div>
</div>

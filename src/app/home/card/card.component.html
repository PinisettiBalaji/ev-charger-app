<div class="card">

  <div class="header">
    <h3>{{ charger.name }}</h3>
    <span class="status" [class.available]="charger.available">
      {{ charger.available ? 'Available' : 'Busy' }}
    </span>
  </div>

  <p class="address">📍 {{ charger.address }}</p>

  <div class="meta">
    <span class="type">⚡ {{ charger.type }}</span>
    <span class="distance">📏 {{ distance }} km</span>
  </div>

  <button class="direction-btn" (click)="openDirections()">
    Get Directions →
  </button>

</div>

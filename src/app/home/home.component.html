<div class="layout">

  <!-- 🔝 TOP BAR -->
  <div class="top-bar">

    <div class="brand">
      <img src="assets/logo.png" />
      <span>EV Finder</span>
    </div>

    <div class="filters">
      <button (click)="applyQuickFilter('available')">Available</button>
      <button (click)="applyQuickFilter('fast')">Fast</button>
      <button (click)="applyQuickFilter('cheap')">Low Price</button>
      <button (click)="applyQuickFilter('nearest')">Nearest</button>
    </div>

  </div>

  <!-- 🧱 MAIN -->
  <div class="main">

    <!-- 📌 SIDEBAR -->
    <div class="sidebar" [class.collapsed]="isSidebarCollapsed">

      <div class="toggle" (click)="toggleSidebar()">☰</div>

      <h2 *ngIf="!isSidebarCollapsed">⚡ EV App</h2>

      <ul>
        <li><span class="icon">🏠</span><span *ngIf="!isSidebarCollapsed">Home</span></li>
        <li><span class="icon">📜</span><span *ngIf="!isSidebarCollapsed">History</span></li>
        <li><span class="icon">⭐</span><span *ngIf="!isSidebarCollapsed">Favorites</span></li>
        <li><span class="icon">🚪</span><span *ngIf="!isSidebarCollapsed">Logout</span></li>
      </ul>

    </div>

    <!-- 🗺️ MAP -->
    <div class="map-container">
      <app-map
        [chargers]="filteredChargers"
        (selectCharger)="onSelect($event)">
      </app-map>
    </div>

    <!-- 📋 LIST -->
    <div class="list-container">
      <app-list
        [chargers]="filteredChargers"
        (selectCharger)="onSelect($event)">
      </app-list>
    </div>

  </div>

</div>
